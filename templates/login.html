<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body class="min-h-screen bg-slate-900 text-slate-100">
    <div class="flex min-h-screen items-center justify-center px-4 py-10">
      <div class="w-full max-w-md rounded-3xl border border-slate-700 bg-slate-950/90 p-8 shadow-2xl shadow-slate-950/30 backdrop-blur-lg">
        <div class="mb-8 text-center">
          <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Admin Panel</p>
          <h1 class="mt-4 text-3xl font-semibold">Login to continue</h1>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="space-y-2 mb-6">
              {% for category, message in messages %}
                <div class="rounded-2xl border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-200">
                  {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        <form method="post" class="space-y-6">
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-300">Username</label>
            <input type="text" name="username" placeholder="admin" required autofocus class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 outline-none transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-300">Password</label>
            <input type="password" name="password" placeholder="••••••••" required class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 outline-none transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20" />
          </div>
          <button type="submit" class="w-full rounded-2xl bg-cyan-500 px-4 py-3 font-semibold text-slate-950 transition hover:bg-cyan-400">Sign In</button>
        </form>
        <p class="mt-6 text-center text-sm text-slate-500">Use <strong>admin</strong> / <strong>admin123</strong></p>
      </div>
    </div>
  </body>
</html>
